<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="container">
      <h1>Weather App</h1>
      <div id="result">
        <img id="weather-icon" src="" class="hidden"/>
        <div id="main-temperature" class="hidden"></div>
        <div id="feels-like" class="hidden"></div>
        <div id="humidity" class="hidden"></div>
        <div id="wind" class="hidden"></div>
        <div id="wind-gust" class="hidden"></div>
        <div id="weather-main" class="hidden"></div>
        <div id="location" class="hidden"></div>
        <div id="compass-container" class="hidden">
  <div id="compass">
    <div id="arrow"></div>
  </div>
  <div id="wind-direction">0°</div>
</div>

      </div>
      <div id="control">
      <select id="select">
        <option value=""></option>
        <option value="new york">New York</option>
        <option value="los angeles">Los Angeles</option>
        <option value="chicago">Chicago</option>
        <option value="paris">Paris</option>
        <option value="tokyo">Tokyo</option>
        <option value="london">London</option>
      </select>
        <button id="get-weather-btn">Get weather</button>
      </div>  
      </div>
    <script src="script.js"></script>
  </body>
</html>
